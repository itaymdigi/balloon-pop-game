<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Balloon Pop!</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    overflow: hidden;
    font-family: 'Arial Rounded MT Bold', Arial, sans-serif;
    user-select: none;
    touch-action: none;
    background: #87CEEB;
  }
  canvas { display: block; cursor: crosshair; }
  #ui {
    position: fixed; top: 0; left: 0; right: 0;
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 18px;
    background: rgba(0,0,0,0.28);
    backdrop-filter: blur(6px);
    z-index: 10; pointer-events: none;
  }
  .ui-pill {
    background: rgba(255,255,255,0.15);
    border-radius: 20px;
    padding: 5px 14px;
    font-weight: bold;
    color: #fff;
    text-shadow: 0 1px 4px rgba(0,0,0,0.4);
  }
  #score-display { font-size: 24px; }
  #level-display { font-size: 17px; color: #FFE66D; transition: font-size 0.3s, color 0.3s; }
  #lives-display { font-size: 24px; letter-spacing: 2px; }
  #mute-btn {
    position: fixed; bottom: 14px; right: 14px;
    background: rgba(255,255,255,0.88); border: none; border-radius: 50%;
    width: 46px; height: 46px; font-size: 22px; cursor: pointer;
    box-shadow: 0 3px 10px rgba(0,0,0,0.25); z-index: 10;
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.1s;
  }
  #mute-btn:active { transform: scale(0.9); }
  #overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.62);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 20; color: #fff; text-align: center; padding: 24px;
  }
  #overlay h1 {
    font-size: clamp(38px, 9vw, 68px);
    text-shadow: 0 3px 14px rgba(0,0,0,0.55);
    margin-bottom: 10px;
  }
  #overlay .subtitle { font-size: clamp(15px, 3vw, 22px); opacity: 0.88; margin-bottom: 6px; }
  #overlay .hint { font-size: clamp(12px, 2vw, 16px); opacity: 0.6; margin-bottom: 26px; }
  #overlay .final-score {
    font-size: clamp(32px, 6vw, 52px);
    color: #FFE66D; margin: 14px 0 26px;
    text-shadow: 0 0 20px rgba(255,210,0,0.6);
  }
  #overlay button {
    background: linear-gradient(135deg, #FF6B6B, #FF8E53);
    color: #fff; border: none; border-radius: 34px;
    padding: 16px 54px; font-size: clamp(20px, 4vw, 28px); font-weight: bold;
    cursor: pointer; box-shadow: 0 6px 22px rgba(255,100,100,0.5);
    transition: transform 0.1s; pointer-events: all;
  }
  #overlay button:active { transform: scale(0.94); }
  #combo-pop {
    position: fixed; top: 72px; left: 50%; transform: translateX(-50%);
    font-size: 30px; font-weight: bold; color: #FFE66D;
    text-shadow: 0 0 20px rgba(255,200,0,0.9), 0 2px 6px rgba(0,0,0,0.5);
    opacity: 0; pointer-events: none; z-index: 15;
    transition: opacity 0.25s;
    white-space: nowrap;
  }
</style>
</head>
<body>

<div id="ui">
  <div class="ui-pill" id="score-display">⭐ 0</div>
  <div class="ui-pill" id="level-display">Level 1</div>
  <div class="ui-pill" id="lives-display">❤️❤️❤️</div>
</div>
<canvas id="gameCanvas"></canvas>
<button id="mute-btn">🔊</button>
<div id="combo-pop"></div>

<div id="overlay">
  <h1>🎈 Balloon Pop!</h1>
  <p class="subtitle">Tap balloons before they escape!</p>
  <p class="hint">⭐ Bigger = more points &nbsp;|&nbsp; ✨ Gold = bonus!</p>
  <button id="start-btn">▶ Play</button>
</div>

<script>
// ── CONSTANTS ────────────────────────────────────────────────────────────────
const CHARS  = ['adiel','itamar','raz','ron','yoni'];
const COLORS = ['#FF6B6B','#4ECDC4','#FFE66D','#A8E6CF','#FF8B94'];
const MAX_LIVES        = 3;
const BASE_SPAWN_MS    = 1500;
const MIN_SPAWN_MS     = 380;
const BASE_SPEED       = 1.3;
const MAX_PARTICLES    = 400;
const LEVEL_INTERVAL   = 20000;  // ms between level-ups
const WAVE_INTERVAL    = 28000;  // ms between balloon waves

// ── STATE ────────────────────────────────────────────────────────────────────
let canvas, ctx, W, H;
let balloons = [], particles = [], floatTexts = [];
let score = 0, lives = MAX_LIVES, level = 1, combo = 0;
let gameActive = false, muted = false;
let audioCtx = null;
let spawnTimerId = null, levelTimerId = null, waveTimerId = null, comboTimerId = null;
let lastTs = 0;
let charImages = {};
let pendingImages = CHARS.length;
let cloudOffsets = [0.06, 0.30, 0.58, 0.82];
const cloudYs    = [0.10, 0.06, 0.14, 0.08];

// ── IMAGE LOADING ─────────────────────────────────────────────────────────────
function loadImages(cb) {
  CHARS.forEach(name => {
    const img = new Image();
    img.onload  = () => { charImages[name] = img;   if (--pendingImages === 0) cb(); };
    img.onerror = () => { charImages[name] = null;  if (--pendingImages === 0) cb(); };
    img.src = name + '.png';
  });
}

// ── AUDIO ─────────────────────────────────────────────────────────────────────
function getAC() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function playPop(pitch = 1) {
  if (muted) return;
  try {
    const ac = getAC();
    const sampleLen = Math.floor(ac.sampleRate * 0.11);
    const buf  = ac.createBuffer(1, sampleLen, ac.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < sampleLen; i++) data[i] = (Math.random()*2-1) * (1 - i/sampleLen);
    const src  = ac.createBufferSource();
    const gain = ac.createGain();
    const filt = ac.createBiquadFilter();
    filt.type = 'bandpass'; filt.frequency.value = 650 * pitch;
    src.buffer = buf;
    src.connect(filt); filt.connect(gain); gain.connect(ac.destination);
    gain.gain.setValueAtTime(0.75, ac.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.11);
    src.start();
  } catch(e) {}
}
function playMiss() {
  if (muted) return;
  try {
    const ac  = getAC();
    const osc = ac.createOscillator();
    const g   = ac.createGain();
    osc.connect(g); g.connect(ac.destination);
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(220, ac.currentTime);
    osc.frequency.exponentialRampToValueAtTime(80, ac.currentTime + 0.3);
    g.gain.setValueAtTime(0.28, ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.3);
    osc.start(); osc.stop(ac.currentTime + 0.3);
  } catch(e) {}
}
function playLevelUp() {
  [523, 659, 784, 1047].forEach((f, i) => setTimeout(() => {
    if (muted) return;
    try {
      const ac = getAC(), osc = ac.createOscillator(), g = ac.createGain();
      osc.connect(g); g.connect(ac.destination);
      osc.type = 'triangle'; osc.frequency.value = f;
      g.gain.setValueAtTime(0.18, ac.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.28);
      osc.start(); osc.stop(ac.currentTime + 0.28);
    } catch(e) {}
  }, i * 95));
}
function playComboSound(n) {
  if (muted) return;
  try {
    const ac = getAC(), osc = ac.createOscillator(), g = ac.createGain();
    osc.connect(g); g.connect(ac.destination);
    osc.type = 'sine'; osc.frequency.value = Math.min(1200, 600 + n * 80);
    g.gain.setValueAtTime(0.14, ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.18);
    osc.start(); osc.stop(ac.currentTime + 0.18);
  } catch(e) {}
}

// ── COLOR UTILS ───────────────────────────────────────────────────────────────
function adjCol(hex, amt) {
  if (!hex.startsWith('#')) return hex;
  const r = Math.max(0, Math.min(255, parseInt(hex.slice(1,3),16)+amt));
  const g = Math.max(0, Math.min(255, parseInt(hex.slice(3,5),16)+amt));
  const b = Math.max(0, Math.min(255, parseInt(hex.slice(5,7),16)+amt));
  return `rgb(${r},${g},${b})`;
}

// ── DRAW AVATAR ───────────────────────────────────────────────────────────────
function drawAvatar(name, cx, cy, r, c) {
  c.save();
  c.beginPath(); c.arc(cx, cy, r, 0, Math.PI*2); c.clip();
  const img = charImages[name];
  if (img) {
    c.drawImage(img, cx-r, cy-r, r*2, r*2);
  } else {
    const idx = CHARS.indexOf(name);
    c.fillStyle = COLORS[idx % COLORS.length];
    c.fillRect(cx-r, cy-r, r*2, r*2);
    c.fillStyle = '#fff';
    c.font = `bold ${Math.floor(r*0.55)}px Arial`;
    c.textAlign = 'center'; c.textBaseline = 'middle';
    c.fillText(name.slice(0,2).toUpperCase(), cx, cy);
  }
  c.restore();
}

// ── BALLOON FACTORY ───────────────────────────────────────────────────────────
function makeBalloon(forceX) {
  const special = Math.random() < 0.11;
  const r       = special ? (42 + Math.random()*14) : (32 + Math.random()*26);
  const charIdx = Math.floor(Math.random() * CHARS.length);
  const spd     = BASE_SPEED + (level-1)*0.28 + Math.random()*1.4;
  return {
    x:  forceX !== undefined ? forceX : r + Math.random()*(W - 2*r),
    y:  H + r + 5,
    r,
    charIdx,
    vy:      -(spd * (special ? 1.25 : 1)),
    drift:   (Math.random()-0.5)*0.55,
    phase:   Math.random()*Math.PI*2,
    special,
    alive:   true,
    popping: false,
    popT:    0,
    points:  special ? 50 : Math.max(10, Math.round(r * 0.58)),
    wobbleT: Math.random()*Math.PI*2,
    wobbleA: 0,
  };
}

// ── SPAWN ─────────────────────────────────────────────────────────────────────
function spawnOne(forceX) { if (gameActive) balloons.push(makeBalloon(forceX)); }

function scheduleSpawning() {
  clearInterval(spawnTimerId);
  const ms = Math.max(MIN_SPAWN_MS, BASE_SPAWN_MS - (level-1)*165);
  spawnTimerId = setInterval(spawnOne, ms);
}

function triggerWave() {
  if (!gameActive) return;
  const count   = 4 + level;
  const spacing = W / (count+1);
  for (let i = 0; i < count; i++) {
    setTimeout(() => { if (gameActive) spawnOne(spacing*(i+1)); }, i*230);
  }
}

// ── POP ───────────────────────────────────────────────────────────────────────
function popBalloon(b) {
  if (!b.alive) return;
  b.alive   = false;
  b.popping = true;
  b.popT    = 0;

  combo++;
  clearTimeout(comboTimerId);
  comboTimerId = setTimeout(() => { combo = 0; }, 1100);

  const pts = b.points * (combo >= 3 ? combo : 1);
  score += pts;
  document.getElementById('score-display').textContent = '⭐ ' + score;

  floatTexts.push({ x: b.x, y: b.y-b.r, text: '+'+pts, life: 1, vy: -2.2,
                    col: b.special ? '#FFE66D' : '#ffffff' });

  if (combo >= 3) {
    playComboSound(combo);
    const el = document.getElementById('combo-pop');
    el.textContent = combo + '× COMBO!';
    el.style.opacity = '1';
    clearTimeout(el._t);
    el._t = setTimeout(() => el.style.opacity='0', 650);
  }

  spawnBurst(b.x, b.y, COLORS[b.charIdx % COLORS.length], b.special);
  playPop(b.special ? 1.6 : 0.75 + b.r/90);
}

// ── PARTICLES ─────────────────────────────────────────────────────────────────
function spawnBurst(x, y, col, special) {
  const n = special ? 42 : 30;
  for (let i = 0; i < n; i++) {
    if (particles.length >= MAX_PARTICLES) break;
    const a   = (i/n)*Math.PI*2 + Math.random()*0.5;
    const spd = (special ? 11 : 8) + Math.random()*11;
    particles.push({
      x, y,
      vx: Math.cos(a)*spd,
      vy: Math.sin(a)*spd - 4,
      r:  (special ? 10 : 8) + Math.random()*11,
      col: (i%4===0) ? '#fff' : (i%4===1) ? adjCol(col,-45) : col,
      life:  1,
      decay: 0.05 + Math.random()*0.045,
    });
  }
  if (special) {
    for (let i = 0; i < 14; i++) {
      if (particles.length >= MAX_PARTICLES) break;
      particles.push({
        x: x+(Math.random()-.5)*70, y: y+(Math.random()-.5)*70,
        vx:(Math.random()-.5)*3.5,  vy:-2.5-Math.random()*3,
        r: 5+Math.random()*6,
        col:'#FFE66D', life:1, decay:0.04+Math.random()*0.03, star:true,
      });
    }
  }
}

// ── HIT TEST ──────────────────────────────────────────────────────────────────
function handleTap(px, py) {
  if (!gameActive) return;
  for (let i = balloons.length-1; i >= 0; i--) {
    const b = balloons[i];
    if (!b.alive) continue;
    const dx = px-b.x, dy = py-b.y;
    if (dx*dx + dy*dy <= b.r*b.r) { popBalloon(b); return; }
  }
}

// ── UPDATE (deltaTime-driven — frame-rate independent) ────────────────────────
function update(dt) {
  // balloons
  for (let i = balloons.length-1; i >= 0; i--) {
    const b = balloons[i];

    if (b.popping) {
      b.popT += 0.17 * dt;
      if (b.popT >= 1) { balloons.splice(i,1); continue; }
      continue;
    }
    if (!b.alive) { balloons.splice(i,1); continue; }

    b.y      += b.vy    * dt;
    b.x      += b.drift * dt + Math.sin(b.phase) * 0.38 * dt;
    b.phase  += 0.019 * dt;
    b.wobbleT+= 0.03  * dt;
    b.wobbleA = Math.max(0, b.wobbleA - 0.07*dt);

    // wall bounce
    if (b.x - b.r < 0)  { b.x = b.r;     b.drift =  Math.abs(b.drift); }
    if (b.x + b.r > W)  { b.x = W - b.r; b.drift = -Math.abs(b.drift); }

    // escaped top → lose life
    if (b.y + b.r < 0) {
      balloons.splice(i,1);
      lives = Math.max(0, lives-1);
      combo = 0;
      playMiss();
      updateLivesUI();
      if (lives <= 0) { gameActive = false; setTimeout(gameOver, 200); }
    }
  }

  // particles
  for (let i = particles.length-1; i >= 0; i--) {
    const p = particles[i];
    p.x    += p.vx  * dt;
    p.y    += p.vy  * dt;
    p.vy   += 0.28  * dt;
    p.vx   *= Math.pow(0.972, dt);
    p.life -= p.decay * dt;
    if (p.life <= 0) particles.splice(i,1);
  }

  // float texts
  for (let i = floatTexts.length-1; i >= 0; i--) {
    const t = floatTexts[i];
    t.y    += t.vy  * dt;
    t.life -= 0.038 * dt;
    if (t.life <= 0) floatTexts.splice(i,1);
  }
}

// ── DRAW ──────────────────────────────────────────────────────────────────────
function draw() {
  ctx.clearRect(0, 0, W, H);

  // sky gradient
  const sky = ctx.createLinearGradient(0, 0, 0, H);
  sky.addColorStop(0, '#5CB8E8');
  sky.addColorStop(0.6, '#B4DEFF');
  sky.addColorStop(1, '#A0E89A');
  ctx.fillStyle = sky; ctx.fillRect(0, 0, W, H);

  // clouds (drift right)
  cloudOffsets = cloudOffsets.map(x => (x + 0.000065) % 1.15);
  ctx.fillStyle = 'rgba(255,255,255,0.83)';
  cloudOffsets.forEach((cx, i) => drawCloud(cx*W, cloudYs[i]*H, 52 + i*14));

  // ground
  ctx.fillStyle = '#57C165'; ctx.fillRect(0, H-38, W, 38);
  ctx.fillStyle = '#3E9B4C'; ctx.fillRect(0, H-40, W, 5);

  // particles (drawn below balloons)
  drawParticles();

  // balloons
  balloons.forEach(b => {
    if (b.popping) {
      drawPopBurst(b);
    } else if (b.alive) {
      drawBalloon(b);
    }
  });

  // floating score texts
  floatTexts.forEach(t => {
    ctx.save();
    ctx.globalAlpha = Math.min(1, t.life * 2.2);
    ctx.font = `bold ${t.col === '#FFE66D' ? 28 : 22}px Arial`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.strokeStyle = 'rgba(0,0,0,0.55)'; ctx.lineWidth = 3.5;
    ctx.strokeText(t.text, t.x, t.y);
    ctx.fillStyle = t.col;
    ctx.fillText(t.text, t.x, t.y);
    ctx.restore();
  });
}

function drawCloud(x, y, r) {
  ctx.beginPath();
  ctx.arc(x,        y,         r,      0, Math.PI*2);
  ctx.arc(x+r*0.9,  y-r*0.38,  r*0.7,  0, Math.PI*2);
  ctx.arc(x+r*1.75, y,         r*0.82, 0, Math.PI*2);
  ctx.fill();
}

function drawParticles() {
  particles.forEach(p => {
    ctx.save();
    ctx.globalAlpha = Math.max(0, p.life);
    ctx.fillStyle = p.col;
    if (p.star) {
      drawStar(p.x, p.y, Math.max(1, p.r * p.life));
    } else {
      ctx.beginPath();
      ctx.arc(p.x, p.y, Math.max(0.5, p.r * p.life), 0, Math.PI*2);
      ctx.fill();
    }
    ctx.restore();
  });
}

function drawStar(x, y, r) {
  ctx.beginPath();
  for (let i = 0; i < 10; i++) {
    const a = (i * Math.PI/5) - Math.PI/2;
    const d = i%2===0 ? r : r*0.42;
    if (i===0) ctx.moveTo(x+Math.cos(a)*d, y+Math.sin(a)*d);
    else        ctx.lineTo(x+Math.cos(a)*d, y+Math.sin(a)*d);
  }
  ctx.closePath(); ctx.fill();
}

function drawBalloon(b) {
  const { x, y, wobbleT, wobbleA } = b;
  const wx = Math.sin(wobbleT*2.5) * wobbleA * 5;

  ctx.save();
  ctx.translate(x + wx, y);

  // string
  ctx.beginPath();
  ctx.moveTo(0, b.r); ctx.quadraticCurveTo(6, b.r+18, 1, b.r+30);
  ctx.strokeStyle = 'rgba(0,0,0,0.32)'; ctx.lineWidth = 1.5; ctx.stroke();

  drawBalloonBody(ctx, b, 0, 0);

  // golden glow for special
  if (b.special) {
    const pulse = 0.45 + 0.22*Math.sin(Date.now()*0.005);
    ctx.beginPath();
    ctx.ellipse(0, 0, b.r*0.9, b.r, 0, 0, Math.PI*2);
    ctx.strokeStyle = `rgba(255,210,0,${pulse})`;
    ctx.lineWidth = 4; ctx.stroke();
    const glow = ctx.createRadialGradient(0,0,b.r*0.6, 0,0,b.r*1.35);
    glow.addColorStop(0, 'rgba(255,210,0,0)');
    glow.addColorStop(0.6, `rgba(255,210,0,${pulse*0.35})`);
    glow.addColorStop(1, 'rgba(255,210,0,0)');
    ctx.beginPath(); ctx.arc(0,0,b.r*1.35,0,Math.PI*2);
    ctx.fillStyle = glow; ctx.fill();
  }

  ctx.restore();
}

function drawBalloonBody(c, b, ox, oy) {
  const r   = b.r;
  const col = COLORS[b.charIdx % COLORS.length];

  // body
  c.beginPath(); c.ellipse(ox, oy, r*0.88, r, 0, 0, Math.PI*2);
  const grad = c.createRadialGradient(ox-r*0.3, oy-r*0.3, r*0.04, ox, oy, r);
  grad.addColorStop(0,   adjCol(col,  65));
  grad.addColorStop(0.6, col);
  grad.addColorStop(1,   adjCol(col, -45));
  c.fillStyle = grad; c.fill();

  // highlight
  c.beginPath(); c.ellipse(ox-r*0.24, oy-r*0.3, r*0.19, r*0.12, -0.5, 0, Math.PI*2);
  c.fillStyle = 'rgba(255,255,255,0.52)'; c.fill();

  // face (large, prominent)
  drawAvatar(CHARS[b.charIdx], ox, oy - r*0.06, r*0.70, c);

  // knot
  c.beginPath(); c.ellipse(ox, oy+r+1, 5, 7, 0, 0, Math.PI*2);
  c.fillStyle = adjCol(col,-32); c.fill();
}

function drawPopBurst(b) {
  const s     = 1 + b.popT * 3.0;
  const alpha = Math.max(0, 1 - b.popT * 1.9);

  // expanding balloon silhouette
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.translate(b.x, b.y);
  ctx.scale(s, s);
  drawBalloonBody(ctx, b, 0, 0);
  ctx.restore();

  // shockwave ring
  ctx.save();
  ctx.globalAlpha = Math.max(0, 0.65 - b.popT * 1.4);
  ctx.beginPath();
  ctx.arc(b.x, b.y, b.r * s * 0.92, 0, Math.PI*2);
  ctx.strokeStyle = COLORS[b.charIdx % COLORS.length];
  ctx.lineWidth = Math.max(0, 6 * (1 - b.popT));
  ctx.stroke();
  ctx.restore();
}

// ── LIVES UI ──────────────────────────────────────────────────────────────────
function updateLivesUI() {
  const full  = Math.max(0, lives);
  const empty = Math.max(0, MAX_LIVES - lives);
  document.getElementById('lives-display').textContent = '❤️'.repeat(full) + '🖤'.repeat(empty);
}

// ── LEVEL UP ──────────────────────────────────────────────────────────────────
function doLevelUp() {
  if (!gameActive) return;
  level++;
  const el = document.getElementById('level-display');
  el.textContent = 'Level ' + level;
  el.style.fontSize = '26px';
  el.style.color = '#FF6B6B';
  setTimeout(() => { el.style.fontSize = '17px'; el.style.color = '#FFE66D'; }, 900);
  scheduleSpawning();
  playLevelUp();
}

// ── GAME OVER ─────────────────────────────────────────────────────────────────
function gameOver() {
  gameActive = false;
  clearInterval(spawnTimerId);
  clearInterval(levelTimerId);
  clearTimeout(waveTimerId);
  const ov = document.getElementById('overlay');
  ov.innerHTML = `
    <h1>💥 Game Over!</h1>
    <div class="final-score">⭐ ${score}</div>
    <p class="subtitle">Level reached: ${level}</p>
    <button id="start-btn" style="margin-top:28px">🎈 Play Again</button>
  `;
  ov.style.display = 'flex';
  document.getElementById('start-btn').onclick = startGame;
}

// ── START ─────────────────────────────────────────────────────────────────────
function startGame() {
  score = 0; lives = MAX_LIVES; level = 1; combo = 0;
  balloons = []; particles = []; floatTexts = [];

  document.getElementById('score-display').textContent = '⭐ 0';
  const lel = document.getElementById('level-display');
  lel.textContent = 'Level 1'; lel.style.fontSize = '17px'; lel.style.color = '#FFE66D';
  updateLivesUI();
  document.getElementById('overlay').style.display = 'none';

  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
  } catch(e) {}

  gameActive = true;
  scheduleSpawning();
  levelTimerId = setInterval(doLevelUp, LEVEL_INTERVAL);

  function scheduleNextWave() {
    waveTimerId = setTimeout(() => {
      if (gameActive) { triggerWave(); scheduleNextWave(); }
    }, WAVE_INTERVAL);
  }
  scheduleNextWave();

  setTimeout(spawnOne, 250); // first balloon immediately
}

// ── MAIN LOOP (deltaTime-corrected) ───────────────────────────────────────────
function loop(ts) {
  requestAnimationFrame(loop);
  // dt = 1.0 at 60fps, 2.0 at 30fps — keeps speed constant regardless of frame rate
  const dt = lastTs ? Math.min((ts - lastTs) / 16.667, 5) : 1;
  lastTs = ts;
  try {
    if (gameActive) update(dt);
    draw();
  } catch(e) { console.error('loop error:', e); }
}

// ── RESIZE ────────────────────────────────────────────────────────────────────
function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
}

// ── INIT ──────────────────────────────────────────────────────────────────────
canvas = document.getElementById('gameCanvas');
ctx    = canvas.getContext('2d');
resize();
window.addEventListener('resize', resize);

// ── INPUT ─────────────────────────────────────────────────────────────────────
canvas.addEventListener('click', e => {
  const rect = canvas.getBoundingClientRect();
  handleTap(e.clientX - rect.left, e.clientY - rect.top);
});
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  for (const t of e.changedTouches) handleTap(t.clientX - rect.left, t.clientY - rect.top);
}, { passive: false });

document.getElementById('mute-btn').onclick = () => {
  muted = !muted;
  document.getElementById('mute-btn').textContent = muted ? '🔇' : '🔊';
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
  } catch(e) {}
};
document.getElementById('start-btn').onclick = startGame;

loadImages(() => requestAnimationFrame(loop));
</script>
