<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Balloon Pop!</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    overflow: hidden;
    font-family: 'Arial Rounded MT Bold', Arial, sans-serif;
    user-select: none;
    touch-action: none;
    background: #87CEEB;
  }
  canvas { display: block; cursor: crosshair; }
  #ui {
    position: fixed; top: 0; left: 0; right: 0;
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 18px;
    background: rgba(0,0,0,0.28);
    backdrop-filter: blur(6px);
    z-index: 10; pointer-events: none;
  }
  .ui-pill {
    background: rgba(255,255,255,0.15);
    border-radius: 20px;
    padding: 5px 14px;
    font-weight: bold;
    color: #fff;
    text-shadow: 0 1px 4px rgba(0,0,0,0.4);
  }
  #score-display { font-size: 24px; }
  #level-display { font-size: 17px; color: #FFE66D; transition: font-size 0.3s, color 0.3s; }
  #lives-display { font-size: 24px; letter-spacing: 2px; }
  #mute-btn {
    position: fixed; bottom: 14px; right: 14px;
    background: rgba(255,255,255,0.88); border: none; border-radius: 50%;
    width: 46px; height: 46px; font-size: 22px; cursor: pointer;
    box-shadow: 0 3px 10px rgba(0,0,0,0.25); z-index: 10;
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.1s;
  }
  #mute-btn:active { transform: scale(0.9); }
  #overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.62);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 20; color: #fff; text-align: center; padding: 24px;
  }
  #overlay h1 {
    font-size: clamp(38px, 9vw, 68px);
    text-shadow: 0 3px 14px rgba(0,0,0,0.55);
    margin-bottom: 10px;
  }
  #overlay .subtitle { font-size: clamp(15px, 3vw, 22px); opacity: 0.88; margin-bottom: 6px; }
  #overlay .hint { font-size: clamp(12px, 2vw, 16px); opacity: 0.6; margin-bottom: 26px; }
  #overlay .final-score {
    font-size: clamp(32px, 6vw, 52px);
    color: #FFE66D; margin: 14px 0 26px;
    text-shadow: 0 0 20px rgba(255,210,0,0.6);
  }
  #overlay button {
    background: linear-gradient(135deg, #FF6B6B, #FF8E53);
    color: #fff; border: none; border-radius: 34px;
    padding: 16px 54px; font-size: clamp(20px, 4vw, 28px); font-weight: bold;
    cursor: pointer; box-shadow: 0 6px 22px rgba(255,100,100,0.5);
    transition: transform 0.1s; pointer-events: all;
  }
  #overlay button:active { transform: scale(0.94); }
  #combo-pop {
    position: fixed; top: 72px; left: 50%; transform: translateX(-50%);
    font-size: 30px; font-weight: bold; color: #FFE66D;
    text-shadow: 0 0 20px rgba(255,200,0,0.9), 0 2px 6px rgba(0,0,0,0.5);
    opacity: 0; pointer-events: none; z-index: 15;
    transition: opacity 0.25s;
    white-space: nowrap;
  }
</style>
</head>
<body>

<div id="ui">
  <div class="ui-pill" id="score-display">⭐ 0</div>
  <div class="ui-pill" id="level-display">Level 1</div>
  <div class="ui-pill" id="lives-display">❤️❤️❤️</div>
</div>
<canvas id="gameCanvas"></canvas>
<button id="mute-btn">🔊</button>
<div id="combo-pop"></div>

<div id="overlay">
  <h1>🎈 Balloon Pop!</h1>
  <p class="subtitle">Tap balloons before they escape!</p>
  <p class="hint">⭐ Bigger = more points &nbsp;|&nbsp; ✨ Gold = bonus!</p>
  <button id="start-btn">▶ Play</button>
</div>

<script>
// ── CONSTANTS ────────────────────────────────────────────────────────────────
const CHARS  = ['adiel','itamar','raz','ron','yoni'];
const COLORS = ['#FF6B6B','#4ECDC4','#FFE66D','#A8E6CF','#FF8B94'];
const MAX_LIVES     = 3;
const MAX_PARTICLES = 400;
const LEVEL_INTERVAL = 18000; // ms between level-ups

// Per-level config: 10 levels, last entry repeats for L11+
const LEVEL_CFG = [
  // L1 – sunny day, gentle
  { skyTop:'#5CB8E8', skyBot:'#A0E89A', spawnMs:1500, speed:1.3, specialChance:0.08, minR:34, maxR:58, waveCnt:4, waveMs:30000, armor:false, zigzag:false, scoreMulti:1 },
  // L2
  { skyTop:'#4EAEE0', skyBot:'#98E492', spawnMs:1300, speed:1.55, specialChance:0.10, minR:32, maxR:56, waveCnt:5, waveMs:27000, armor:false, zigzag:false, scoreMulti:1 },
  // L3 – afternoon
  { skyTop:'#3A9ED0', skyBot:'#8CD880', spawnMs:1120, speed:1.8, specialChance:0.12, minR:30, maxR:54, waveCnt:5, waveMs:25000, armor:false, zigzag:false, scoreMulti:1 },
  // L4 – zigzag begins
  { skyTop:'#E89060', skyBot:'#82D478', spawnMs:960,  speed:2.05, specialChance:0.13, minR:28, maxR:52, waveCnt:6, waveMs:23000, armor:false, zigzag:true,  scoreMulti:2 },
  // L5 – sunset
  { skyTop:'#D06858', skyBot:'#78C870', spawnMs:830,  speed:2.3,  specialChance:0.14, minR:26, maxR:50, waveCnt:6, waveMs:21000, armor:false, zigzag:true,  scoreMulti:2 },
  // L6 – dusk, armored balloons appear
  { skyTop:'#5A3A8E', skyBot:'#4A805C', spawnMs:720,  speed:2.6,  specialChance:0.15, minR:26, maxR:48, waveCnt:7, waveMs:19000, armor:true,  zigzag:true,  scoreMulti:3 },
  // L7 – night
  { skyTop:'#1E2A60', skyBot:'#3A6850', spawnMs:620,  speed:2.9,  specialChance:0.17, minR:24, maxR:46, waveCnt:8, waveMs:17000, armor:true,  zigzag:true,  scoreMulti:3 },
  // L8 – deep night
  { skyTop:'#121840', skyBot:'#2A5040', spawnMs:530,  speed:3.2,  specialChance:0.19, minR:22, maxR:44, waveCnt:9, waveMs:15000, armor:true,  zigzag:true,  scoreMulti:4 },
  // L9 – storm
  { skyTop:'#0A1230', skyBot:'#1E3830', spawnMs:460,  speed:3.6,  specialChance:0.21, minR:20, maxR:42, waveCnt:10,waveMs:13000, armor:true,  zigzag:true,  scoreMulti:4 },
  // L10 – CHAOS
  { skyTop:'#06091A', skyBot:'#142820', spawnMs:390,  speed:4.1,  specialChance:0.25, minR:18, maxR:40, waveCnt:12,waveMs:11000, armor:true,  zigzag:true,  scoreMulti:5 },
];
function cfg() { return LEVEL_CFG[Math.min(level-1, LEVEL_CFG.length-1)]; }

// ── STATE ────────────────────────────────────────────────────────────────────
let canvas, ctx, W, H;
let balloons = [], particles = [], floatTexts = [];
let score = 0, lives = MAX_LIVES, level = 1, combo = 0;
let gameActive = false, muted = false;
let audioCtx = null;
let spawnTimerId = null, levelTimerId = null, waveTimerId = null, comboTimerId = null;
let lastTs = 0;
let charImages = {};
let pendingImages = CHARS.length;
let cloudOffsets = [0.06, 0.30, 0.58, 0.82];
const cloudYs    = [0.10, 0.06, 0.14, 0.08];
// level-up banner
let levelBanner = { active: false, t: 0, text: '' };

// ── IMAGE LOADING ─────────────────────────────────────────────────────────────
function loadImages(cb) {
  CHARS.forEach(name => {
    const img = new Image();
    img.onload  = () => { charImages[name] = img;   if (--pendingImages === 0) cb(); };
    img.onerror = () => { charImages[name] = null;  if (--pendingImages === 0) cb(); };
    img.src = name + '.png';
  });
}

// ── AUDIO ─────────────────────────────────────────────────────────────────────
function getAC() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function playPop(pitch = 1) {
  if (muted) return;
  try {
    const ac = getAC();
    const sampleLen = Math.floor(ac.sampleRate * 0.11);
    const buf  = ac.createBuffer(1, sampleLen, ac.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < sampleLen; i++) data[i] = (Math.random()*2-1) * (1 - i/sampleLen);
    const src  = ac.createBufferSource();
    const gain = ac.createGain();
    const filt = ac.createBiquadFilter();
    filt.type = 'bandpass'; filt.frequency.value = 650 * pitch;
    src.buffer = buf;
    src.connect(filt); filt.connect(gain); gain.connect(ac.destination);
    gain.gain.setValueAtTime(0.75, ac.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.11);
    src.start();
  } catch(e) {}
}
function playMiss() {
  if (muted) return;
  try {
    const ac  = getAC();
    const osc = ac.createOscillator();
    const g   = ac.createGain();
    osc.connect(g); g.connect(ac.destination);
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(220, ac.currentTime);
    osc.frequency.exponentialRampToValueAtTime(80, ac.currentTime + 0.3);
    g.gain.setValueAtTime(0.28, ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.3);
    osc.start(); osc.stop(ac.currentTime + 0.3);
  } catch(e) {}
}
function playLevelUp() {
  [523, 659, 784, 1047].forEach((f, i) => setTimeout(() => {
    if (muted) return;
    try {
      const ac = getAC(), osc = ac.createOscillator(), g = ac.createGain();
      osc.connect(g); g.connect(ac.destination);
      osc.type = 'triangle'; osc.frequency.value = f;
      g.gain.setValueAtTime(0.18, ac.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.28);
      osc.start(); osc.stop(ac.currentTime + 0.28);
    } catch(e) {}
  }, i * 95));
}
function playComboSound(n) {
  if (muted) return;
  try {
    const ac = getAC(), osc = ac.createOscillator(), g = ac.createGain();
    osc.connect(g); g.connect(ac.destination);
    osc.type = 'sine'; osc.frequency.value = Math.min(1200, 600 + n * 80);
    g.gain.setValueAtTime(0.14, ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.18);
    osc.start(); osc.stop(ac.currentTime + 0.18);
  } catch(e) {}
}

// ── COLOR UTILS ───────────────────────────────────────────────────────────────
function adjCol(hex, amt) {
  if (!hex.startsWith('#')) return hex;
  const r = Math.max(0, Math.min(255, parseInt(hex.slice(1,3),16)+amt));
  const g = Math.max(0, Math.min(255, parseInt(hex.slice(3,5),16)+amt));
  const b = Math.max(0, Math.min(255, parseInt(hex.slice(5,7),16)+amt));
  return `rgb(${r},${g},${b})`;
}

// ── DRAW AVATAR ───────────────────────────────────────────────────────────────
function drawAvatar(name, cx, cy, r, c) {
  c.save();
  c.beginPath(); c.arc(cx, cy, r, 0, Math.PI*2); c.clip();
  const img = charImages[name];
  if (img) {
    c.drawImage(img, cx-r, cy-r, r*2, r*2);
  } else {
    const idx = CHARS.indexOf(name);
    c.fillStyle = COLORS[idx % COLORS.length];
    c.fillRect(cx-r, cy-r, r*2, r*2);
    c.fillStyle = '#fff';
    c.font = `bold ${Math.floor(r*0.55)}px Arial`;
    c.textAlign = 'center'; c.textBaseline = 'middle';
    c.fillText(name.slice(0,2).toUpperCase(), cx, cy);
  }
  c.restore();
}

// ── BALLOON FACTORY ───────────────────────────────────────────────────────────
function makeBalloon(forceX) {
  const c       = cfg();
  const special = Math.random() < c.specialChance;
  const rMin    = special ? Math.max(c.minR, 38) : c.minR;
  const rMax    = special ? Math.min(c.maxR, 56) : c.maxR;
  const r       = rMin + Math.random()*(rMax - rMin);
  const charIdx = Math.floor(Math.random() * CHARS.length);
  const spd     = c.speed + Math.random()*1.2;
  // armored: L6+ has 20% chance of 2-hit balloon
  const armored = c.armor && !special && Math.random() < 0.20;
  return {
    x:  forceX !== undefined ? forceX : r + Math.random()*(W - 2*r),
    y:  H + r + 5,
    r,
    charIdx,
    vy:      -(spd * (special ? 1.3 : 1)),
    drift:   (Math.random()-0.5)*0.55,
    phase:   Math.random()*Math.PI*2,
    // zigzag: horizontal sine oscillation
    zigzag:  c.zigzag && !special,
    zigFreq: 0.025 + Math.random()*0.02,
    zigAmp:  30 + Math.random()*40,
    zigT:    Math.random()*Math.PI*2,
    special,
    armored,
    cracked: false, // armored hit once
    alive:   true,
    popping: false,
    popT:    0,
    points:  special ? 50 + level*5 : Math.max(10, Math.round(r * 0.58)) * c.scoreMulti,
    wobbleT: Math.random()*Math.PI*2,
    wobbleA: 0,
  };
}

// ── SPAWN ─────────────────────────────────────────────────────────────────────
function spawnOne(forceX) { if (gameActive) balloons.push(makeBalloon(forceX)); }

function scheduleSpawning() {
  clearInterval(spawnTimerId);
  spawnTimerId = setInterval(spawnOne, cfg().spawnMs);
}

function triggerWave() {
  if (!gameActive) return;
  const count   = cfg().waveCnt;
  const spacing = W / (count+1);
  for (let i = 0; i < count; i++) {
    setTimeout(() => { if (gameActive) spawnOne(spacing*(i+1)); }, i*210);
  }
}

// ── POP ───────────────────────────────────────────────────────────────────────
function popBalloon(b) {
  if (!b.alive) return;
  // armored: first hit cracks it, second hit pops it
  if (b.armored && !b.cracked) {
    b.cracked  = true;
    b.wobbleA  = 8; // shake
    playPop(0.5);
    floatTexts.push({ x:b.x, y:b.y-b.r, text:'CRACKED!', life:1, vy:-1.8, col:'#FF8B94' });
    return;
  }
  b.alive   = false;
  b.popping = true;
  b.popT    = 0;

  combo++;
  clearTimeout(comboTimerId);
  comboTimerId = setTimeout(() => { combo = 0; }, 1100);

  const pts = b.points * (combo >= 3 ? combo : 1);
  score += pts;
  document.getElementById('score-display').textContent = '⭐ ' + score;

  floatTexts.push({ x: b.x, y: b.y-b.r, text: '+'+pts, life: 1, vy: -2.2,
                    col: b.special ? '#FFE66D' : '#ffffff' });

  if (combo >= 3) {
    playComboSound(combo);
    const el = document.getElementById('combo-pop');
    el.textContent = combo + '× COMBO!';
    el.style.opacity = '1';
    clearTimeout(el._t);
    el._t = setTimeout(() => el.style.opacity='0', 650);
  }

  spawnBurst(b.x, b.y, COLORS[b.charIdx % COLORS.length], b.special);
  playPop(b.special ? 1.6 : 0.75 + b.r/90);
}

// ── PARTICLES ─────────────────────────────────────────────────────────────────
function spawnBurst(x, y, col, special) {
  const n = special ? 42 : 30;
  for (let i = 0; i < n; i++) {
    if (particles.length >= MAX_PARTICLES) break;
    const a   = (i/n)*Math.PI*2 + Math.random()*0.5;
    const spd = (special ? 11 : 8) + Math.random()*11;
    particles.push({
      x, y,
      vx: Math.cos(a)*spd,
      vy: Math.sin(a)*spd - 4,
      r:  (special ? 10 : 8) + Math.random()*11,
      col: (i%4===0) ? '#fff' : (i%4===1) ? adjCol(col,-45) : col,
      life:  1,
      decay: 0.05 + Math.random()*0.045,
    });
  }
  if (special) {
    for (let i = 0; i < 14; i++) {
      if (particles.length >= MAX_PARTICLES) break;
      particles.push({
        x: x+(Math.random()-.5)*70, y: y+(Math.random()-.5)*70,
        vx:(Math.random()-.5)*3.5,  vy:-2.5-Math.random()*3,
        r: 5+Math.random()*6,
        col:'#FFE66D', life:1, decay:0.04+Math.random()*0.03, star:true,
      });
    }
  }
}

// ── HIT TEST ──────────────────────────────────────────────────────────────────
function handleTap(px, py) {
  if (!gameActive) return;
  for (let i = balloons.length-1; i >= 0; i--) {
    const b = balloons[i];
    if (!b.alive) continue;
    const dx = px-b.x, dy = py-b.y;
    if (dx*dx + dy*dy <= b.r*b.r) { popBalloon(b); return; }
  }
}

// ── UPDATE (deltaTime-driven — frame-rate independent) ────────────────────────
function update(dt) {
  // balloons
  for (let i = balloons.length-1; i >= 0; i--) {
    const b = balloons[i];

    if (b.popping) {
      b.popT += 0.17 * dt;
      if (b.popT >= 1) { balloons.splice(i,1); continue; }
      continue;
    }
    if (!b.alive) { balloons.splice(i,1); continue; }

    b.y      += b.vy    * dt;
    b.wobbleT+= 0.03  * dt;
    b.wobbleA = Math.max(0, b.wobbleA - 0.07*dt);

    if (b.zigzag) {
      // sinusoidal horizontal sweep
      b.zigT += b.zigFreq * dt;
      b.x = Math.max(b.r, Math.min(W-b.r, b.x + Math.cos(b.zigT) * b.zigAmp * b.zigFreq * dt * 2));
    } else {
      b.x    += b.drift * dt + Math.sin(b.phase) * 0.38 * dt;
      b.phase+= 0.019 * dt;
      // wall bounce
      if (b.x - b.r < 0)  { b.x = b.r;     b.drift =  Math.abs(b.drift); }
      if (b.x + b.r > W)  { b.x = W - b.r; b.drift = -Math.abs(b.drift); }
    }

    // escaped top → lose life
    if (b.y + b.r < 0) {
      balloons.splice(i,1);
      lives = Math.max(0, lives-1);
      combo = 0;
      playMiss();
      updateLivesUI();
      if (lives <= 0) { gameActive = false; setTimeout(gameOver, 200); }
    }
  }

  // particles
  for (let i = particles.length-1; i >= 0; i--) {
    const p = particles[i];
    p.x    += p.vx  * dt;
    p.y    += p.vy  * dt;
    p.vy   += 0.28  * dt;
    p.vx   *= Math.pow(0.972, dt);
    p.life -= p.decay * dt;
    if (p.life <= 0) particles.splice(i,1);
  }

  // float texts
  for (let i = floatTexts.length-1; i >= 0; i--) {
    const t = floatTexts[i];
    t.y    += t.vy  * dt;
    t.life -= 0.038 * dt;
    if (t.life <= 0) floatTexts.splice(i,1);
  }
}

// ── DRAW ──────────────────────────────────────────────────────────────────────
function draw() {
  ctx.clearRect(0, 0, W, H);

  // sky gradient (changes with level)
  const c = cfg();
  const sky = ctx.createLinearGradient(0, 0, 0, H);
  sky.addColorStop(0,   c.skyTop);
  sky.addColorStop(0.7, c.skyBot);
  ctx.fillStyle = sky; ctx.fillRect(0, 0, W, H);

  // stars on night levels (L6+)
  if (level >= 6) {
    ctx.fillStyle = `rgba(255,255,255,${Math.min(0.9, (level-5)*0.18)})`;
    // deterministic star positions using simple hash
    for (let i = 0; i < 60; i++) {
      const sx = ((i*137.508 + 23) % W);
      const sy = ((i*97.31  + 11) % (H*0.55));
      const sr = 0.8 + (i%3)*0.6;
      const pulse = 0.5 + 0.5*Math.sin(Date.now()*0.001 + i);
      ctx.globalAlpha = pulse * Math.min(0.9, (level-5)*0.2);
      ctx.beginPath(); ctx.arc(sx, sy, sr, 0, Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  // clouds (drift right)
  cloudOffsets = cloudOffsets.map(x => (x + 0.000065) % 1.15);
  ctx.fillStyle = 'rgba(255,255,255,0.83)';
  cloudOffsets.forEach((cx, i) => drawCloud(cx*W, cloudYs[i]*H, 52 + i*14));

  // ground
  ctx.fillStyle = '#57C165'; ctx.fillRect(0, H-38, W, 38);
  ctx.fillStyle = '#3E9B4C'; ctx.fillRect(0, H-40, W, 5);

  // particles (drawn below balloons)
  drawParticles();

  // balloons
  balloons.forEach(b => {
    if (b.popping) {
      drawPopBurst(b);
    } else if (b.alive) {
      drawBalloon(b);
    }
  });

  // level-up banner
  if (levelBanner.active) {
    levelBanner.t += 0.03;
    if (levelBanner.t > 1) { levelBanner.active = false; }
    else {
      const fade  = levelBanner.t < 0.3 ? levelBanner.t/0.3 : 1 - (levelBanner.t-0.3)/0.7;
      const scale = 0.6 + levelBanner.t * 0.8;
      ctx.save();
      ctx.globalAlpha = Math.max(0, fade);
      ctx.font = `bold ${Math.floor(H * 0.09 * scale)}px Arial`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.strokeStyle = 'rgba(0,0,0,0.55)'; ctx.lineWidth = 8;
      ctx.strokeText(levelBanner.text, W/2, H/2);
      ctx.fillStyle = '#FFE66D';
      ctx.fillText(levelBanner.text, W/2, H/2);
      ctx.restore();
    }
  }

  // floating score texts
  floatTexts.forEach(t => {
    ctx.save();
    ctx.globalAlpha = Math.min(1, t.life * 2.2);
    ctx.font = `bold ${t.col === '#FFE66D' ? 28 : 22}px Arial`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.strokeStyle = 'rgba(0,0,0,0.55)'; ctx.lineWidth = 3.5;
    ctx.strokeText(t.text, t.x, t.y);
    ctx.fillStyle = t.col;
    ctx.fillText(t.text, t.x, t.y);
    ctx.restore();
  });
}

function drawCloud(x, y, r) {
  ctx.beginPath();
  ctx.arc(x,        y,         r,      0, Math.PI*2);
  ctx.arc(x+r*0.9,  y-r*0.38,  r*0.7,  0, Math.PI*2);
  ctx.arc(x+r*1.75, y,         r*0.82, 0, Math.PI*2);
  ctx.fill();
}

function drawParticles() {
  particles.forEach(p => {
    ctx.save();
    ctx.globalAlpha = Math.max(0, p.life);
    ctx.fillStyle = p.col;
    if (p.star) {
      drawStar(p.x, p.y, Math.max(1, p.r * p.life));
    } else {
      ctx.beginPath();
      ctx.arc(p.x, p.y, Math.max(0.5, p.r * p.life), 0, Math.PI*2);
      ctx.fill();
    }
    ctx.restore();
  });
}

function drawStar(x, y, r) {
  ctx.beginPath();
  for (let i = 0; i < 10; i++) {
    const a = (i * Math.PI/5) - Math.PI/2;
    const d = i%2===0 ? r : r*0.42;
    if (i===0) ctx.moveTo(x+Math.cos(a)*d, y+Math.sin(a)*d);
    else        ctx.lineTo(x+Math.cos(a)*d, y+Math.sin(a)*d);
  }
  ctx.closePath(); ctx.fill();
}

function drawBalloon(b) {
  const { x, y, wobbleT, wobbleA } = b;
  const wx = Math.sin(wobbleT*2.5) * wobbleA * 5;

  ctx.save();
  ctx.translate(x + wx, y);

  // string
  ctx.beginPath();
  ctx.moveTo(0, b.r); ctx.quadraticCurveTo(6, b.r+18, 1, b.r+30);
  ctx.strokeStyle = 'rgba(0,0,0,0.32)'; ctx.lineWidth = 1.5; ctx.stroke();

  drawBalloonBody(ctx, b, 0, 0);

  // crack overlay for armored balloons
  if (b.armored && b.cracked) {
    ctx.save();
    ctx.strokeStyle = 'rgba(0,0,0,0.7)';
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    // lightning-bolt crack pattern
    ctx.moveTo(-b.r*0.1, -b.r*0.5);
    ctx.lineTo( b.r*0.2, -b.r*0.1);
    ctx.lineTo(-b.r*0.1,  b.r*0.1);
    ctx.lineTo( b.r*0.3,  b.r*0.5);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(-b.r*0.3, -b.r*0.3);
    ctx.lineTo(-b.r*0.05, 0);
    ctx.lineTo(-b.r*0.35, b.r*0.3);
    ctx.stroke();
    ctx.restore();
  }

  // golden glow for special
  if (b.special) {
    const pulse = 0.45 + 0.22*Math.sin(Date.now()*0.005);
    ctx.beginPath();
    ctx.ellipse(0, 0, b.r*0.9, b.r, 0, 0, Math.PI*2);
    ctx.strokeStyle = `rgba(255,210,0,${pulse})`;
    ctx.lineWidth = 4; ctx.stroke();
    const glow = ctx.createRadialGradient(0,0,b.r*0.6, 0,0,b.r*1.35);
    glow.addColorStop(0, 'rgba(255,210,0,0)');
    glow.addColorStop(0.6, `rgba(255,210,0,${pulse*0.35})`);
    glow.addColorStop(1, 'rgba(255,210,0,0)');
    ctx.beginPath(); ctx.arc(0,0,b.r*1.35,0,Math.PI*2);
    ctx.fillStyle = glow; ctx.fill();
  }

  ctx.restore();
}

function drawBalloonBody(c, b, ox, oy) {
  const r   = b.r;
  const col = COLORS[b.charIdx % COLORS.length];

  // body
  c.beginPath(); c.ellipse(ox, oy, r*0.88, r, 0, 0, Math.PI*2);
  const grad = c.createRadialGradient(ox-r*0.3, oy-r*0.3, r*0.04, ox, oy, r);
  grad.addColorStop(0,   adjCol(col,  65));
  grad.addColorStop(0.6, col);
  grad.addColorStop(1,   adjCol(col, -45));
  c.fillStyle = grad; c.fill();

  // highlight
  c.beginPath(); c.ellipse(ox-r*0.24, oy-r*0.3, r*0.19, r*0.12, -0.5, 0, Math.PI*2);
  c.fillStyle = 'rgba(255,255,255,0.52)'; c.fill();

  // face (large, prominent)
  drawAvatar(CHARS[b.charIdx], ox, oy - r*0.06, r*0.70, c);

  // knot
  c.beginPath(); c.ellipse(ox, oy+r+1, 5, 7, 0, 0, Math.PI*2);
  c.fillStyle = adjCol(col,-32); c.fill();
}

function drawPopBurst(b) {
  const s     = 1 + b.popT * 3.0;
  const alpha = Math.max(0, 1 - b.popT * 1.9);

  // expanding balloon silhouette
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.translate(b.x, b.y);
  ctx.scale(s, s);
  drawBalloonBody(ctx, b, 0, 0);
  ctx.restore();

  // shockwave ring
  ctx.save();
  ctx.globalAlpha = Math.max(0, 0.65 - b.popT * 1.4);
  ctx.beginPath();
  ctx.arc(b.x, b.y, b.r * s * 0.92, 0, Math.PI*2);
  ctx.strokeStyle = COLORS[b.charIdx % COLORS.length];
  ctx.lineWidth = Math.max(0, 6 * (1 - b.popT));
  ctx.stroke();
  ctx.restore();
}

// ── LIVES UI ──────────────────────────────────────────────────────────────────
function updateLivesUI() {
  const full  = Math.max(0, lives);
  const empty = Math.max(0, MAX_LIVES - lives);
  document.getElementById('lives-display').textContent = '❤️'.repeat(full) + '🖤'.repeat(empty);
}

// ── LEVEL UP ──────────────────────────────────────────────────────────────────
function doLevelUp() {
  if (!gameActive) return;
  level++;
  const el = document.getElementById('level-display');
  const isMax = level >= LEVEL_CFG.length;
  el.textContent = isMax ? `⚡ MAX LEVEL ${level}` : 'Level ' + level;
  el.style.fontSize = '24px';
  el.style.color = '#FF6B6B';
  setTimeout(() => { el.style.fontSize = '17px'; el.style.color = '#FFE66D'; }, 1000);
  scheduleSpawning();
  playLevelUp();
  levelBanner.active = true;
  levelBanner.t      = 0;
  levelBanner.text   = level >= LEVEL_CFG.length ? `⚡ CHAOS! ⚡` : `🎈 Level ${level}!`;
}

// ── GAME OVER ─────────────────────────────────────────────────────────────────
function gameOver() {
  gameActive = false;
  clearInterval(spawnTimerId);
  clearInterval(levelTimerId);
  clearTimeout(waveTimerId);
  const ov = document.getElementById('overlay');
  ov.innerHTML = `
    <h1>💥 Game Over!</h1>
    <div class="final-score">⭐ ${score}</div>
    <p class="subtitle">Level reached: ${level}</p>
    <button id="start-btn" style="margin-top:28px">🎈 Play Again</button>
  `;
  ov.style.display = 'flex';
  document.getElementById('start-btn').onclick = startGame;
}

// ── START ─────────────────────────────────────────────────────────────────────
function startGame() {
  score = 0; lives = MAX_LIVES; level = 1; combo = 0;
  balloons = []; particles = []; floatTexts = [];

  document.getElementById('score-display').textContent = '⭐ 0';
  const lel = document.getElementById('level-display');
  lel.textContent = 'Level 1'; lel.style.fontSize = '17px'; lel.style.color = '#FFE66D';
  updateLivesUI();
  document.getElementById('overlay').style.display = 'none';

  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
  } catch(e) {}

  gameActive = true;
  scheduleSpawning();
  levelTimerId = setInterval(doLevelUp, LEVEL_INTERVAL);

  function scheduleNextWave() {
    waveTimerId = setTimeout(() => {
      if (gameActive) { triggerWave(); scheduleNextWave(); }
    }, cfg().waveMs);
  }
  scheduleNextWave();

  setTimeout(spawnOne, 250); // first balloon immediately
}

// ── MAIN LOOP (deltaTime-corrected) ───────────────────────────────────────────
function loop(ts) {
  requestAnimationFrame(loop);
  // dt = 1.0 at 60fps, 2.0 at 30fps — keeps speed constant regardless of frame rate
  const dt = lastTs ? Math.min((ts - lastTs) / 16.667, 5) : 1;
  lastTs = ts;
  try {
    if (gameActive) update(dt);
    draw();
  } catch(e) { console.error('loop error:', e); }
}

// ── RESIZE ────────────────────────────────────────────────────────────────────
function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
}

// ── INIT ──────────────────────────────────────────────────────────────────────
canvas = document.getElementById('gameCanvas');
ctx    = canvas.getContext('2d');
resize();
window.addEventListener('resize', resize);

// ── INPUT ─────────────────────────────────────────────────────────────────────
canvas.addEventListener('click', e => {
  const rect = canvas.getBoundingClientRect();
  handleTap(e.clientX - rect.left, e.clientY - rect.top);
});
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  for (const t of e.changedTouches) handleTap(t.clientX - rect.left, t.clientY - rect.top);
}, { passive: false });

document.getElementById('mute-btn').onclick = () => {
  muted = !muted;
  document.getElementById('mute-btn').textContent = muted ? '🔇' : '🔊';
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
  } catch(e) {}
};
document.getElementById('start-btn').onclick = startGame;

loadImages(() => requestAnimationFrame(loop));
</script>
