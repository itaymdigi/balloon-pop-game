<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Bubble Shooter!</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; user-select: none; }
  body { background: #12122a; overflow: hidden; font-family: Arial, sans-serif; }
  canvas { display: block; }
  #ui {
    position: fixed; top: 0; left: 0; right: 0; height: 52px;
    display: flex; justify-content: space-between; align-items: center;
    padding: 0 16px; z-index: 10; pointer-events: none;
    background: linear-gradient(180deg,rgba(0,0,0,0.5),rgba(0,0,0,0));
  }
  .pill {
    color: #fff; font-weight: bold; font-size: 19px;
    text-shadow: 0 1px 4px rgba(0,0,0,0.6);
    background: rgba(255,255,255,0.12); border-radius: 16px; padding: 3px 13px;
  }
  #overlay {
    position: fixed; inset: 0; background: rgba(10,10,30,0.82);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 20; color: #fff; text-align: center; padding: 24px;
  }
  #overlay h1   { font-size: clamp(34px,8vw,60px); margin-bottom: 10px; }
  #overlay .sub { font-size: clamp(13px,2.8vw,20px); opacity: 0.8; margin-bottom: 6px; }
  #overlay .hint{ font-size: clamp(11px,2vw,16px); opacity: 0.55; margin-bottom: 24px; }
  #overlay .fscore { font-size: clamp(28px,5vw,46px); color: #FFE66D; margin-bottom: 22px; font-weight: bold; }
  #overlay button {
    background: linear-gradient(135deg,#FF6B6B,#FF8E53);
    color: #fff; border: none; border-radius: 32px;
    padding: 14px 52px; font-size: clamp(18px,3.5vw,26px); font-weight: bold;
    cursor: pointer; pointer-events: all; box-shadow: 0 6px 20px rgba(255,100,100,0.45);
    transition: transform .1s;
  }
  #overlay button:active { transform: scale(0.94); }
  #mute {
    position: fixed; bottom: 12px; right: 12px; z-index: 10;
    background: rgba(255,255,255,0.88); border: none; border-radius: 50%;
    width: 42px; height: 42px; font-size: 20px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  }
</style>
</head>
<body>
<div id="ui">
  <div class="pill" id="score-el">⭐ 0</div>
  <div class="pill" id="level-el">Level 1</div>
  <div class="pill" id="lives-el">❤️❤️❤️</div>
</div>
<canvas id="c"></canvas>
<button id="mute">🔊</button>
<div id="overlay">
  <h1>🎈 Bubble Shooter!</h1>
  <div class="sub">Shoot to match 3+ same faces!</div>
  <div class="hint">Click / tap to aim and fire</div>
  <button id="start-btn">▶ Play</button>
</div>

<script>
// ── CONFIG ────────────────────────────────────────────────────────────────────
const CHARS  = ['adiel','itamar','raz','ron','yoni'];
const COLORS = ['#FF3232','#32C8FF','#FFD700','#32FF88','#FF50C8'];
const NUM_COLS  = 8;
const MIN_MATCH = 3;
const MAX_LIVES = 3;
const UI_H      = 52;

// 10 difficulty levels
// speed: projectile speed, armorPct: fraction of bubbles with armor,
// descent: pixels/frame the grid slides down (0 = static)
const LEVELS = [
  {rows:4,  chars:2, speed:14, armorPct:0.00, descent:0.00, bg1:'#1a1a3e', bg2:'#2a1040', name:'Warm Up'},
  {rows:5,  chars:2, speed:14, armorPct:0.00, descent:0.00, bg1:'#1a1a3e', bg2:'#2a1040', name:'Getting Started'},
  {rows:5,  chars:3, speed:15, armorPct:0.00, descent:0.00, bg1:'#1a2038', bg2:'#281050', name:'Mix It Up'},
  {rows:6,  chars:3, speed:16, armorPct:0.00, descent:0.00, bg1:'#0e1a36', bg2:'#201050', name:'Crowded'},
  {rows:6,  chars:4, speed:17, armorPct:0.00, descent:0.00, bg1:'#0a1428', bg2:'#180a40', name:'Speed Rush'},
  {rows:7,  chars:4, speed:17, armorPct:0.20, descent:0.00, bg1:'#0a0a28', bg2:'#280034', name:'Armored!'},
  {rows:7,  chars:5, speed:18, armorPct:0.30, descent:0.00, bg1:'#080820', bg2:'#200030', name:'Full Chaos'},
  {rows:8,  chars:5, speed:18, armorPct:0.30, descent:0.25, bg1:'#100016', bg2:'#0a002a', name:'Descending Doom'},
  {rows:9,  chars:5, speed:19, armorPct:0.40, descent:0.45, bg1:'#0f0010', bg2:'#060020', name:'Panic Mode'},
  {rows:10, chars:5, speed:20, armorPct:0.50, descent:0.70, bg1:'#180000', bg2:'#200008', name:'BOSS LEVEL'},
];
function getLevelCfg(){ return LEVELS[Math.min(level-1, LEVELS.length-1)]; }

// ── STATE ─────────────────────────────────────────────────────────────────────
let canvas, ctx, W, H;
let BR = 26;       // bubble radius
let GL = 0;        // grid left X
let GT = UI_H;     // grid top Y
let RH = 0;        // row height

let grid = [];     // grid[row][col] = charIdx  (-1 = empty)
let armorGrid = [];// armorGrid[row][col] = bool (armored bubble)
let descentY = 0;  // extra Y pixels — grid slides down over time
let pops = [];     // {x,y,charIdx,t}
let drops = [];    // {x,y,vy,acc,charIdx}
let parts = [];    // particles
let ftexts = [];   // floating score texts
let bannerT = -1;  // level-up banner animation t (0-1, -1=off)
let bannerTxt = '';

let fly = null;    // flying bubble {x,y,vx,vy,charIdx}
let currChar = 0, nextChar = 1;
let aimPt = null;  // {x,y} pointer for aim line
let canShoot = true;

let score=0, lives=MAX_LIVES, level=1;
let gameActive=false, muted=false;
let audioCtx=null;
let charImages={}, pendingImg=CHARS.length;
let lastTs=0;

// ── IMAGES ───────────────────────────────────────────────────────────────────
function loadImages(cb) {
  CHARS.forEach(name=>{
    const img=new Image();
    img.onload =()=>{ charImages[name]=img;   if(!--pendingImg)cb(); };
    img.onerror=()=>{ charImages[name]=null;  if(!--pendingImg)cb(); };
    img.src=name+'.png';
  });
}

// ── AUDIO ────────────────────────────────────────────────────────────────────
function getAC(){ if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)(); return audioCtx; }
function snd(fn){ if(muted)return; try{fn(getAC());}catch(e){} }
function playShoot(){ snd(ac=>{ const o=ac.createOscillator(),g=ac.createGain(); o.connect(g);g.connect(ac.destination); o.type='sine';o.frequency.setValueAtTime(500,ac.currentTime);o.frequency.exponentialRampToValueAtTime(250,ac.currentTime+0.1); g.gain.setValueAtTime(0.12,ac.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.1); o.start();o.stop(ac.currentTime+0.1); }); }
function playPop(){ snd(ac=>{ const n=Math.floor(ac.sampleRate*0.09),buf=ac.createBuffer(1,n,ac.sampleRate),d=buf.getChannelData(0); for(let i=0;i<n;i++)d[i]=(Math.random()*2-1)*(1-i/n); const src=ac.createBufferSource(),g=ac.createGain(),f=ac.createBiquadFilter(); f.type='bandpass';f.frequency.value=900; src.buffer=buf;src.connect(f);f.connect(g);g.connect(ac.destination); g.gain.setValueAtTime(0.6,ac.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.09); src.start(); }); }
function playWin(){ [523,659,784,1047].forEach((f,i)=>setTimeout(()=>snd(ac=>{ const o=ac.createOscillator(),g=ac.createGain(); o.connect(g);g.connect(ac.destination); o.type='triangle';o.frequency.value=f; g.gain.setValueAtTime(0.18,ac.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.3); o.start();o.stop(ac.currentTime+0.3); }),i*100)); }

// ── GRID HELPERS ─────────────────────────────────────────────────────────────
const cols = r => r%2===0 ? NUM_COLS : NUM_COLS-1;

function cellXY(r,c){
  return {
    x: GL + (r%2===1 ? BR : 0) + BR + c*BR*2,
    y: GT + BR + r*RH + descentY
  };
}

function neighbors(r,c){
  const odd=r%2===1;
  return [
    [r-1, odd?c:c-1],[r-1, odd?c+1:c],
    [r,   c-1],      [r,   c+1],
    [r+1, odd?c:c-1],[r+1, odd?c+1:c],
  ].filter(([nr,nc])=>nr>=0&&nr<grid.length&&nc>=0&&nc<cols(nr));
}

// ── GRID INIT ─────────────────────────────────────────────────────────────────
function ensureRow(r){
  while(grid.length<=r){
    const ri=grid.length;
    grid.push(new Array(cols(ri)).fill(-1));
    armorGrid.push(new Array(cols(ri)).fill(false));
  }
}

function initGrid(){
  const cfg = getLevelCfg();
  grid=[]; armorGrid=[];
  for(let r=0;r<cfg.rows;r++){
    const row=[], arow=[];
    for(let c=0;c<cols(r);c++){
      row.push(Math.floor(Math.random()*cfg.chars));
      arow.push(cfg.armorPct>0 && Math.random()<cfg.armorPct);
    }
    grid.push(row); armorGrid.push(arow);
  }
  // Always have 2 empty rows at bottom so bubbles can attach
  ensureRow(grid.length+1);
}

// ── RAND CHAR ────────────────────────────────────────────────────────────────
function randChar(){
  const present=new Set();
  grid.forEach(row=>row.forEach(v=>{ if(v!==-1)present.add(v); }));
  const pool=[...present];
  if(!pool.length) return Math.floor(Math.random()*CHARS.length);
  return pool[Math.floor(Math.random()*pool.length)];
}

// ── FLOOD FILL ───────────────────────────────────────────────────────────────
function floodSame(r0,c0,ci){
  const seen=new Set(), q=[[r0,c0]], res=[];
  while(q.length){
    const[r,c]=q.shift(), k=r+','+c;
    if(seen.has(k))continue; seen.add(k);
    if(r<0||r>=grid.length||c<0||c>=cols(r))continue;
    if(grid[r][c]!==ci)continue;
    res.push([r,c]);
    neighbors(r,c).forEach(n=>q.push(n));
  }
  return res;
}

function findFloating(){
  const connected=new Set(), q=[];
  for(let c=0;c<cols(0);c++){
    if(grid[0]?.[c]!==undefined&&grid[0][c]!==-1){ q.push([0,c]); connected.add('0,'+c); }
  }
  while(q.length){
    const[r,c]=q.shift();
    neighbors(r,c).forEach(([nr,nc])=>{
      const k=nr+','+nc;
      if(!connected.has(k)&&grid[nr]?.[nc]!==-1&&grid[nr][nc]!==undefined){
        connected.add(k); q.push([nr,nc]);
      }
    });
  }
  const fl=[];
  grid.forEach((row,r)=>row.forEach((v,c)=>{ if(v!==-1&&!connected.has(r+','+c))fl.push([r,c]); }));
  return fl;
}

// ── ATTACH + MATCH ────────────────────────────────────────────────────────────
function attachAt(r,c,ci){
  if(r<0||r>=grid.length||c<0||c>=cols(r))return;
  grid[r][c]=ci;
  armorGrid[r][c]=false; // freshly placed bubble is never armored

  // danger: bubble too low
  const {y}=cellXY(r,c);
  if(y+BR > H-SHOOT_ZONE-BR){
    lives=Math.max(0,lives-1); updateLivesUI();
    if(lives<=0){ gameActive=false; setTimeout(gameOver,400); return; }
  }

  const matched=floodSame(r,c,ci);
  if(matched.length>=MIN_MATCH){
    let popped=0;
    matched.forEach(([mr,mc])=>{
      if(armorGrid[mr][mc]){
        // crack armor — remove shield, keep bubble
        armorGrid[mr][mc]=false;
        const p=cellXY(mr,mc); crackEffect(p.x,p.y);
      } else {
        const p=cellXY(mr,mc);
        burst(p.x,p.y,COLORS[ci]);
        pops.push({x:p.x,y:p.y,charIdx:ci,t:0});
        grid[mr][mc]=-1; popped++;
      }
    });

    if(popped>0){
      score+=popped*10*level;
      document.getElementById('score-el').textContent='⭐ '+score;
      playPop();

      const fl=findFloating();
      fl.forEach(([fr,fc])=>{
        const p=cellXY(fr,fc);
        drops.push({x:p.x,y:p.y,vy:1,acc:0.4,charIdx:grid[fr][fc]});
        grid[fr][fc]=-1; armorGrid[fr][fc]=false;
      });
      if(fl.length){ score+=fl.length*20*level; document.getElementById('score-el').textContent='⭐ '+score; }
    }
  }

  // win check: only count the originally-filled rows
  const filledRows=getLevelCfg().rows;
  if(!grid.slice(0,filledRows).some(row=>row.some(v=>v!==-1))) setTimeout(levelWin,700);
}

// ── SNAP TO NEAREST EMPTY SLOT ───────────────────────────────────────────────
function snapToGrid(){
  ensureRow(grid.length); // guarantee at least one empty row at bottom
  // Pass 1: prefer empty cells that are adjacent to an occupied cell (proper attachment)
  let best=null, bestD=Infinity;
  for(let r=0;r<grid.length;r++){
    for(let c=0;c<cols(r);c++){
      if(grid[r][c]!==-1)continue; // skip occupied
      const hasN=r===0||neighbors(r,c).some(([nr,nc])=>{
        const v=grid[nr]?.[nc]; return v!==undefined&&v!==-1;
      });
      if(!hasN)continue;
      const{x,y}=cellXY(r,c);
      const d=(fly.x-x)**2+(fly.y-y)**2;
      if(d<bestD){bestD=d;best=[r,c];}
    }
  }
  // Pass 2: fallback – no adjacent-to-occupied cell found, pick any nearest empty cell
  if(!best){
    bestD=Infinity;
    for(let r=0;r<grid.length;r++){
      for(let c=0;c<cols(r);c++){
        if(grid[r][c]!==-1)continue;
        const{x,y}=cellXY(r,c);
        const d=(fly.x-x)**2+(fly.y-y)**2;
        if(d<bestD){bestD=d;best=[r,c];}
      }
    }
  }
  if(best)attachAt(best[0],best[1],fly.charIdx);
}

// ── TRY ATTACH ───────────────────────────────────────────────────────────────
let SHOOT_ZONE = 130; // pixels from bottom for shooter area

function tryAttach(){
  if(!fly)return false;
  // hit top wall
  if(fly.y-BR<=GT){snapToGrid();return true;}
  // hit any occupied bubble (find nearest, not first)
  let nearD=Infinity;
  for(let r=0;r<grid.length;r++){
    for(let c=0;c<cols(r);c++){
      if(grid[r][c]===-1)continue;
      const{x,y}=cellXY(r,c);
      const dx=fly.x-x,dy=fly.y-y;
      const d=dx*dx+dy*dy;
      if(d<nearD)nearD=d;
    }
  }
  if(nearD<(BR*2.0)**2){snapToGrid();return true;}
  return false;
}

// ── SHOOT ────────────────────────────────────────────────────────────────────
const SX = ()=>W/2;
const SY = ()=>H-SHOOT_ZONE+32;

function shoot(tx,ty){
  if(!gameActive||!canShoot||fly)return;
  let dx=tx-SX(), dy=ty-SY();
  if(dy>=-10)return; // must shoot upward
  const len=Math.sqrt(dx*dx+dy*dy);
  const spd=getLevelCfg().speed;
  fly={x:SX(),y:SY(),vx:dx/len*spd,vy:dy/len*spd,charIdx:currChar};
  currChar=nextChar; nextChar=randChar();
  canShoot=false;
  playShoot();
}

// ── ARMOR CRACK EFFECT ───────────────────────────────────────────────────────
function crackEffect(x,y){
  for(let i=0;i<10;i++){
    const a=Math.random()*Math.PI*2, s=3+Math.random()*6;
    parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-2,r:3+Math.random()*4,col:'#aaaacc',life:1,decay:0.1+Math.random()*0.06});
  }
}

// ── PARTICLES ────────────────────────────────────────────────────────────────
function burst(x,y,col){
  for(let i=0;i<22;i++){
    const a=(i/22)*Math.PI*2+Math.random()*0.4, s=7+Math.random()*11;
    parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-4,r:6+Math.random()*9,col,life:1,decay:0.055+Math.random()*0.04});
  }
}

// ── UPDATE ───────────────────────────────────────────────────────────────────
function update(dt){
  if(fly){
    fly.x+=fly.vx*dt; fly.y+=fly.vy*dt;
    if(fly.x-BR<0) {fly.x=BR;   fly.vx=Math.abs(fly.vx);}
    if(fly.x+BR>W) {fly.x=W-BR; fly.vx=-Math.abs(fly.vx);}
    if(tryAttach()){
      fly=null;
      setTimeout(()=>{canShoot=true;},280);
    }
    if(fly&&fly.y<-BR*3){fly=null;setTimeout(()=>{canShoot=true;},200);}
  }

  // grid descent
  const cfg=getLevelCfg();
  if(cfg.descent>0){
    descentY+=cfg.descent*dt;
    // check if any bubble has crossed the danger line
    let danger=false;
    grid.forEach((row,r)=>{ if(row.some(v=>v!==-1)){ const{y}=cellXY(r,0); if(y+BR>H-SHOOT_ZONE-BR)danger=true; } });
    if(danger){
      lives=Math.max(0,lives-1); updateLivesUI();
      descentY=0; // snap grid back up
      if(lives<=0){ gameActive=false; setTimeout(gameOver,400); }
    }
  }

  pops.forEach(p=>p.t+=0.15*dt);
  pops=pops.filter(p=>p.t<1);
  drops.forEach(d=>{d.y+=d.vy*dt;d.vy+=d.acc*dt;});
  drops=drops.filter(d=>d.y<H+BR*2);
  parts.forEach(p=>{p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=0.3*dt;p.vx*=Math.pow(0.97,dt);p.life-=p.decay*dt;});
  parts=parts.filter(p=>p.life>0);
  ftexts.forEach(t=>{t.y+=t.vy*dt;t.life-=0.038*dt;});
  ftexts=ftexts.filter(t=>t.life>0);
  if(bannerT>=0){bannerT+=0.025*dt;if(bannerT>1)bannerT=-1;}
}

// ── DRAW ─────────────────────────────────────────────────────────────────────
function draw(){
  ctx.clearRect(0,0,W,H);

  // background gradient (per-level theme)
  const lcfg=getLevelCfg();
  const bg=ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,lcfg.bg1); bg.addColorStop(1,lcfg.bg2);
  ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);

  // grid area backing
  const gridH=grid.length*RH+BR*2;
  ctx.fillStyle='rgba(200,220,255,0.05)';
  ctx.fillRect(0,GT,W,gridH);

  // grid bubbles
  grid.forEach((row,r)=>row.forEach((ci,c)=>{
    if(ci===-1)return;
    const{x,y}=cellXY(r,c);
    drawBubble(x,y,ci,BR);
  }));

  // armor overlay
  grid.forEach((row,r)=>row.forEach((ci,c)=>{
    if(ci===-1||!armorGrid[r]?.[c])return;
    const{x,y}=cellXY(r,c);
    drawArmorOverlay(x,y,BR);
  }));

  // pop bursts
  pops.forEach(p=>{
    const s=1+p.t*2.2, alpha=Math.max(0,1-p.t*1.8);
    ctx.save(); ctx.globalAlpha=alpha; ctx.translate(p.x,p.y); ctx.scale(s,s);
    drawBubbleBody(p.charIdx,BR,0,0); ctx.restore();
    // shockwave
    ctx.save(); ctx.globalAlpha=Math.max(0,0.5-p.t*1.2);
    ctx.beginPath(); ctx.arc(p.x,p.y,BR*s*0.95,0,Math.PI*2);
    ctx.strokeStyle=COLORS[p.charIdx%COLORS.length]; ctx.lineWidth=Math.max(0,5*(1-p.t)); ctx.stroke();
    ctx.restore();
  });

  // drops (floating bubbles falling)
  drops.forEach(d=>drawBubble(d.x,d.y,d.charIdx,BR));

  // particles
  parts.forEach(p=>{
    ctx.save(); ctx.globalAlpha=Math.max(0,p.life);
    ctx.fillStyle=p.col; ctx.beginPath(); ctx.arc(p.x,p.y,Math.max(0.5,p.r*p.life),0,Math.PI*2); ctx.fill();
    ctx.restore();
  });

  // aim line
  drawAimLine();

  // flying bubble
  if(fly) drawBubble(fly.x,fly.y,fly.charIdx,BR);

  // shooter zone
  drawShooter();

  // level banner
  if(bannerT>=0&&bannerT<1){
    const fade=bannerT<0.25?bannerT/0.25:Math.max(0,1-(bannerT-0.25)/0.75);
    const sc=0.5+bannerT*0.9;
    ctx.save(); ctx.globalAlpha=Math.max(0,fade);
    ctx.font=`bold ${Math.floor(H*0.1*sc)}px Arial`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.strokeStyle='rgba(0,0,0,0.6)'; ctx.lineWidth=8;
    ctx.strokeText(bannerTxt,W/2,H/2);
    ctx.fillStyle='#FFE66D'; ctx.fillText(bannerTxt,W/2,H/2);
    ctx.restore();
  }

  // floating texts
  ftexts.forEach(t=>{
    ctx.save(); ctx.globalAlpha=Math.min(1,t.life*2.5);
    ctx.font=`bold 22px Arial`; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.strokeStyle='rgba(0,0,0,0.6)'; ctx.lineWidth=3; ctx.strokeText(t.text,t.x,t.y);
    ctx.fillStyle=t.col; ctx.fillText(t.text,t.x,t.y);
    ctx.restore();
  });
}

// ── DRAW BUBBLE ───────────────────────────────────────────────────────────────
function drawBubble(x,y,ci,r){
  ctx.save(); ctx.translate(x,y); drawBubbleBody(ci,r,0,0); ctx.restore();
}

function drawBubbleBody(ci,r,ox,oy){
  const col=COLORS[ci%COLORS.length];
  // shadow
  ctx.save();
  ctx.shadowColor='rgba(0,0,0,0.45)'; ctx.shadowBlur=7; ctx.shadowOffsetY=3;
  ctx.beginPath(); ctx.arc(ox,oy,r,0,Math.PI*2);
  const g=ctx.createRadialGradient(ox-r*0.35,oy-r*0.38,r*0.04,ox,oy,r);
  g.addColorStop(0,adjCol(col,75)); g.addColorStop(0.55,col); g.addColorStop(1,adjCol(col,-50));
  ctx.fillStyle=g; ctx.fill();
  ctx.restore();
  // face
  drawFace(CHARS[ci],ox,oy,r*0.70);
  // glossy highlight
  ctx.save();
  const hl=ctx.createRadialGradient(ox-r*0.28,oy-r*0.38,r*0.02,ox-r*0.1,oy-r*0.15,r*0.55);
  hl.addColorStop(0,'rgba(255,255,255,0.78)'); hl.addColorStop(0.5,'rgba(255,255,255,0.14)'); hl.addColorStop(1,'rgba(255,255,255,0)');
  ctx.beginPath(); ctx.arc(ox,oy,r,0,Math.PI*2); ctx.fillStyle=hl; ctx.fill();
  ctx.restore();
}

function drawArmorOverlay(x,y,r){
  ctx.save();
  // metallic sheen
  ctx.globalAlpha=0.52;
  const g=ctx.createRadialGradient(x-r*0.25,y-r*0.25,r*0.05,x,y,r);
  g.addColorStop(0,'rgba(230,230,255,0.9)'); g.addColorStop(0.5,'rgba(140,140,180,0.55)'); g.addColorStop(1,'rgba(60,60,90,0.75)');
  ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fillStyle=g; ctx.fill();
  // ring
  ctx.globalAlpha=0.7; ctx.strokeStyle='#9090bb'; ctx.lineWidth=3;
  ctx.beginPath(); ctx.arc(x,y,r*0.82,0,Math.PI*2); ctx.stroke();
  // shield emoji
  ctx.globalAlpha=0.85; ctx.font=`bold ${Math.floor(r*0.65)}px Arial`;
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillStyle='rgba(255,255,255,0.9)'; ctx.fillText('🛡',x,y);
  ctx.restore();
}

function drawFace(name,cx,cy,r){
  ctx.save(); ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.clip();
  const img=charImages[name];
  if(img){ ctx.drawImage(img,cx-r,cy-r,r*2,r*2); }
  else {
    const idx=CHARS.indexOf(name);
    ctx.fillStyle=COLORS[idx%COLORS.length]; ctx.fillRect(cx-r,cy-r,r*2,r*2);
    ctx.fillStyle='#fff'; ctx.font=`bold ${Math.floor(r*0.55)}px Arial`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(name.slice(0,2).toUpperCase(),cx,cy);
  }
  ctx.restore();
}

// ── DRAW SHOOTER ──────────────────────────────────────────────────────────────
function drawShooter(){
  const sx=SX(), sy=SY();

  // dark shooter zone backdrop
  ctx.save();
  const zt=ctx.createLinearGradient(0,H-SHOOT_ZONE,0,H);
  zt.addColorStop(0,'rgba(10,10,30,0)'); zt.addColorStop(0.3,'rgba(10,10,30,0.9)'); zt.addColorStop(1,'rgba(5,5,20,1)');
  ctx.fillStyle=zt; ctx.fillRect(0,H-SHOOT_ZONE,W,SHOOT_ZONE);
  ctx.restore();

  // separator line
  ctx.strokeStyle='rgba(255,255,255,0.12)'; ctx.lineWidth=1.5;
  ctx.setLineDash([6,10]);
  ctx.beginPath(); ctx.moveTo(0,H-SHOOT_ZONE); ctx.lineTo(W,H-SHOOT_ZONE); ctx.stroke();
  ctx.setLineDash([]);

  // cannon base glow
  const cg=ctx.createRadialGradient(sx,sy+10,5,sx,sy,55);
  cg.addColorStop(0,'rgba(100,150,255,0.22)'); cg.addColorStop(1,'rgba(100,150,255,0)');
  ctx.fillStyle=cg; ctx.beginPath(); ctx.arc(sx,sy,55,0,Math.PI*2); ctx.fill();

  // current bubble on launcher
  drawBubble(sx,sy,currChar,BR);

  // arrow showing aim direction
  if(aimPt&&canShoot&&!fly){
    let dx=aimPt.x-sx, dy=aimPt.y-sy;
    if(dy<-10){
      const len=Math.sqrt(dx*dx+dy*dy);
      dx/=len; dy/=len;
      const ax=sx+dx*(BR+14), ay=sy+dy*(BR+14);
      ctx.save();
      ctx.strokeStyle='rgba(255,255,255,0.45)'; ctx.lineWidth=2.5;
      ctx.beginPath(); ctx.moveTo(sx,sy); ctx.lineTo(ax,ay); ctx.stroke();
      ctx.restore();
    }
  }

  // next bubble preview (top-right of shooter)
  const nx=Math.min(W-BR-8, sx+BR*3.2), ny=sy-BR*0.3;
  ctx.save(); ctx.globalAlpha=0.75;
  drawBubble(nx,ny,nextChar,BR*0.65);
  ctx.restore();
  ctx.save();
  ctx.fillStyle='rgba(255,255,255,0.45)'; ctx.font=`bold 11px Arial`;
  ctx.textAlign='center'; ctx.textBaseline='bottom';
  ctx.fillText('NEXT',nx,ny-BR*0.65-3);
  ctx.restore();
}

// ── DRAW AIM LINE ─────────────────────────────────────────────────────────────
function drawAimLine(){
  if(!aimPt||!canShoot||fly)return;
  const sx=SX(), sy=SY();
  let dx=aimPt.x-sx, dy=aimPt.y-sy;
  if(dy>=-10)return;
  const len=Math.sqrt(dx*dx+dy*dy);
  dx/=len; dy/=len;

  ctx.save();
  ctx.strokeStyle='rgba(255,255,255,0.45)'; ctx.lineWidth=2;
  ctx.setLineDash([7,10]);
  ctx.beginPath(); ctx.moveTo(sx,sy);

  let x=sx,y=sy,vx=dx,vy=dy;
  for(let i=0;i<500;i++){
    x+=vx*4; y+=vy*4;
    if(x-BR<0){x=BR;vx=Math.abs(vx);}
    if(x+BR>W){x=W-BR;vx=-Math.abs(vx);}
    ctx.lineTo(x,y);
    if(y<GT+BR*2)break;
  }
  ctx.stroke();

  // aim dot at line end
  ctx.setLineDash([]);
  ctx.fillStyle='rgba(255,255,255,0.6)';
  ctx.beginPath(); ctx.arc(x,y,5,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

// ── COLOR UTIL ────────────────────────────────────────────────────────────────
function adjCol(hex,amt){
  if(!hex.startsWith('#'))return hex;
  const r=Math.max(0,Math.min(255,parseInt(hex.slice(1,3),16)+amt));
  const g=Math.max(0,Math.min(255,parseInt(hex.slice(3,5),16)+amt));
  const b=Math.max(0,Math.min(255,parseInt(hex.slice(5,7),16)+amt));
  return `rgb(${r},${g},${b})`;
}

// ── UI ────────────────────────────────────────────────────────────────────────
function updateLivesUI(){
  document.getElementById('lives-el').textContent='❤️'.repeat(Math.max(0,lives))+'🖤'.repeat(Math.max(0,MAX_LIVES-lives));
}

// ── WIN / LOSE ────────────────────────────────────────────────────────────────
function levelWin(){
  playWin();
  if(level>=LEVELS.length){
    // Final victory!
    bannerTxt='🏆 YOU WIN!'; bannerT=0;
    setTimeout(()=>{
      const ov=document.getElementById('overlay');
      ov.innerHTML=`<h1>🏆 YOU WIN!</h1>
        <div class="sub">All 10 levels conquered!</div>
        <div class="fscore">⭐ ${score}</div>
        <button id="start-btn" style="margin-top:20px">🎈 Play Again</button>`;
      ov.style.display='flex';
      document.getElementById('start-btn').onclick=()=>{
        score=0;lives=MAX_LIVES;level=1;
        document.getElementById('score-el').textContent='⭐ 0';
        document.getElementById('level-el').textContent='Level 1';
        updateLivesUI(); startRound();
      };
    },2200);
    return;
  }
  bannerTxt=`🎉 Level ${level} Clear!`; bannerT=0;
  level++;
  document.getElementById('level-el').textContent='Level '+level;
  setTimeout(()=>{
    const cfg=getLevelCfg();
    const ov=document.getElementById('overlay');
    const hints=[];
    if(cfg.armorPct>0) hints.push('🛡 Armored bubbles — crack them first!');
    if(cfg.descent>0)  hints.push('⬇️ The grid is descending — shoot fast!');
    ov.innerHTML=`<h1>🎉 Level ${level-1} Clear!</h1>
      <div class="sub">Level ${level}: <b>${cfg.name}</b></div>
      ${hints.map(h=>`<div class="hint">${h}</div>`).join('')}
      <div class="fscore">⭐ ${score}</div>
      <button id="start-btn" style="margin-top:8px">▶ Level ${level}</button>`;
    ov.style.display='flex';
    document.getElementById('start-btn').onclick=startRound;
  },1800);
}

function gameOver(){
  gameActive=false;
  const ov=document.getElementById('overlay');
  ov.innerHTML=`<h1>💥 Game Over!</h1>
    <div class="fscore">⭐ ${score}</div>
    <div class="sub">Level reached: ${level}</div>
    <button id="start-btn" style="margin-top:20px">🎈 Play Again</button>`;
  ov.style.display='flex';
  document.getElementById('start-btn').onclick=()=>{
    score=0;lives=MAX_LIVES;level=1;
    document.getElementById('score-el').textContent='⭐ 0';
    document.getElementById('level-el').textContent='Level 1';
    updateLivesUI(); startRound();
  };
}

// ── START ROUND ───────────────────────────────────────────────────────────────
function startRound(){
  document.getElementById('overlay').style.display='none';
  pops=[];drops=[];parts=[];ftexts=[];fly=null;canShoot=true;bannerT=-1;
  descentY=0;
  initGrid();
  currChar=randChar(); nextChar=randChar();
  gameActive=true;
  // Show level name as banner
  const cfg=getLevelCfg();
  bannerTxt=`Level ${level}: ${cfg.name}`; bannerT=0;
  try{
    if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    if(audioCtx.state==='suspended')audioCtx.resume();
  }catch(e){}
}

// ── LOOP ─────────────────────────────────────────────────────────────────────
function loop(ts){
  requestAnimationFrame(loop);
  const dt=lastTs?Math.min((ts-lastTs)/16.667,4):1; lastTs=ts;
  try{if(gameActive)update(dt);draw();}catch(e){console.error(e);}
}

// ── RESIZE ───────────────────────────────────────────────────────────────────
function resize(){
  W=canvas.width=window.innerWidth;
  H=canvas.height=window.innerHeight;
  SHOOT_ZONE=Math.min(160,Math.max(110,H*0.18));
  BR=Math.min(44,Math.max(18,Math.floor(W/(NUM_COLS*2+1))));
  GL=(W-NUM_COLS*BR*2)/2;
  GT=UI_H;
  RH=Math.floor(BR*Math.sqrt(3));
}

// ── INPUT ────────────────────────────────────────────────────────────────────
canvas=document.getElementById('c');
ctx=canvas.getContext('2d');
resize(); window.addEventListener('resize',resize);

canvas.addEventListener('mousemove',e=>{
  const r=canvas.getBoundingClientRect();
  aimPt={x:e.clientX-r.left,y:e.clientY-r.top};
});
canvas.addEventListener('click',e=>{
  const r=canvas.getBoundingClientRect();
  shoot(e.clientX-r.left,e.clientY-r.top);
});
canvas.addEventListener('touchstart',e=>{
  e.preventDefault();
  const r=canvas.getBoundingClientRect(),t=e.changedTouches[0];
  aimPt={x:t.clientX-r.left,y:t.clientY-r.top};
  shoot(aimPt.x,aimPt.y);
},{passive:false});
canvas.addEventListener('touchmove',e=>{
  e.preventDefault();
  const r=canvas.getBoundingClientRect(),t=e.changedTouches[0];
  aimPt={x:t.clientX-r.left,y:t.clientY-r.top};
},{passive:false});

document.getElementById('mute').onclick=()=>{
  muted=!muted; document.getElementById('mute').textContent=muted?'🔇':'🔊';
};
document.getElementById('start-btn').onclick=()=>{
  score=0;lives=MAX_LIVES;level=1;
  document.getElementById('score-el').textContent='⭐ 0';
  document.getElementById('level-el').textContent='Level 1';
  updateLivesUI(); startRound();
};

loadImages(()=>requestAnimationFrame(loop));
</script>
